<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Donaciones · Reporte público</title>
<style>
  :root{
    --bg:#0b132b; --card:#1c2541; --accent:#5bc0be; --line:#3a506b;
    --text:#e8eef2; --muted:#9fb3c8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text);padding:18px}
  h1{font-size:22px;margin:0 0 2px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-text{font-size:30px;font-weight:800;letter-spacing:3px;color:var(--text)}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .total-usd:empty{display:none}
  .total-usd{background:linear-gradient(135deg,#13314a,#1c2541);border:1px solid var(--accent);
    border-radius:14px;padding:18px 20px;margin-bottom:16px}
  .total-usd .tu-label{color:var(--muted);font-size:13px;letter-spacing:.5px;text-transform:uppercase}
  .total-usd .tu-monto{color:var(--accent);font-size:34px;font-weight:800;margin-top:2px}
  .total-usd .tu-nota{color:var(--muted);font-size:12px;margin-top:6px}
  .donaciones-card{background:linear-gradient(135deg,#13314a,#1c2541);border-color:var(--accent);text-align:center}
  .donaciones-card .tu-monto{color:#fff;font-size:40px}
  .egresos-card{background:linear-gradient(135deg,#3a2230,#2a1c25);border-color:#c97a8a}
  .egresos-card .tu-monto{color:#f0a6b4;font-size:26px}
  .egresos-sec:empty{display:none}
  .egresos-sec{margin:26px 0 8px}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .cat summary{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:13px 14px;cursor:pointer;font-size:15px;list-style:none}
  .cat summary::-webkit-details-marker{display:none}
  .cat summary::before{content:'▸';color:var(--accent);margin-right:6px;transition:transform .15s}
  .cat[open] summary::before{transform:rotate(90deg)}
  .cat-nom{font-weight:600;flex:1}
  .cat-tot{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .cat table{margin:0 0 6px}
  .cat td{padding:8px 14px;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}
  .sec-tit{font-size:16px;margin:22px 0 10px;color:var(--text)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
  .resumen{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:0 0 6px}
  .resumen-card{padding:14px 16px}
  .resumen-card.acc{border-color:var(--accent)}
  .resumen-card.egr{border-color:#c97a8a}
  .resumen-card.sal{border-color:#9bd4a0}
  .rc-label{color:var(--muted);font-size:12px;letter-spacing:.4px;text-transform:uppercase}
  .rc-monto{font-size:26px;font-weight:800;margin-top:4px}
  .resumen-card.acc .rc-monto{color:var(--accent)}
  .resumen-card.egr .rc-monto{color:#f0a6b4}
  .resumen-card.sal .rc-monto{color:#9bd4a0}
  .nota-tasas{color:var(--muted);font-size:12px;margin:0 0 20px}
  .ayuda-cta{text-align:center;color:var(--muted);font-size:13px;margin:-12px 0 26px;line-height:1.5}
  .ayuda-cta b{color:var(--accent)}
  .ayuda{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin:0 0 16px}
  .ayuda-item{display:flex;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:14px;font-size:14px;line-height:1.45;color:var(--text)}
  .ayuda-item b{color:var(--accent)}
  .ayuda-ico{font-size:20px;flex-shrink:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
  .card .moneda{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.5px}
  .card .monto{font-size:22px;font-weight:700;margin-top:6px}
  .card .det{color:var(--muted);font-size:12px;margin-top:4px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;align-items:center}
  input,select{background:var(--card);border:1px solid var(--line);color:var(--text);
       padding:9px 12px;border-radius:9px;font-size:14px;outline:none}
  input{flex:1;min-width:180px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none}
  td.monto{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  tr:hover td{background:rgba(91,192,190,.06)}
  .tag{font-size:11px;color:var(--accent);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
  .foot{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}
  .site-foot{color:var(--muted);font-size:13px;text-align:center;margin:28px 0 80px;
    padding-top:16px;border-top:1px solid var(--line)}
  .site-foot a{color:var(--accent);text-decoration:none;font-weight:600}
  .site-foot a:hover{text-decoration:underline}
  .loading{color:var(--muted);padding:40px;text-align:center}
  .empty{color:var(--muted);padding:34px 18px;text-align:center;font-size:15px;
    border:1px dashed var(--line);border-radius:12px;background:rgba(58,80,107,.12)}
  @media(max-width:520px){ .card .monto{font-size:18px} td,th{padding:8px} }

  .btn-donar-grande{display:block;width:100%;background:var(--accent);color:#06121a;font-weight:800;
    border:none;border-radius:14px;padding:20px;font-size:22px;cursor:pointer;margin:0 0 22px;
    box-shadow:0 8px 24px rgba(91,192,190,.3)}
  .btn-donar-grande:hover{filter:brightness(1.07)}
  .head-donar{background:var(--accent);color:#06121a;font-weight:800;border:none;border-radius:9px;
    padding:9px 16px;font-size:14px;cursor:pointer}
  .btn-lang{background:transparent;color:var(--text);border:1px solid var(--line);border-radius:9px;
    padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-lang:hover{border-color:var(--accent);color:var(--accent)}
  .overlay{position:fixed;inset:0;background:rgba(2,7,15,.72);display:none;z-index:40;
    align-items:flex-start;justify-content:center;padding:24px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:460px;width:100%;
    padding:20px;margin-top:24px}
  .modal h2{margin:0 0 4px;font-size:20px}
  .modal .sub2{color:var(--muted);font-size:13px;margin-bottom:16px}
  .aviso{background:rgba(240,166,180,.1);border:1px solid #c97a8a;border-radius:8px;
    padding:8px 10px;font-size:12px;line-height:1.4;color:var(--muted);margin-bottom:14px}
  .aviso b{color:#f0a6b4}
  .pay{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .pay .nombre{color:var(--accent);font-weight:700;font-size:14px;margin-bottom:8px}
  .field{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;
    border-top:1px dashed var(--line)}
  .field:first-of-type{border-top:none}
  .field .k{color:var(--muted);font-size:12px}
  .field .v{font-weight:600;font-size:14px;word-break:break-all;text-align:right;flex:1}
  .field a.lnk{color:var(--accent);text-decoration:none}
  .field a.lnk:hover{text-decoration:underline}
  .copy{background:var(--line);color:var(--text);border:none;border-radius:7px;padding:5px 10px;
    font-size:12px;cursor:pointer;white-space:nowrap}
  .copy:hover{background:#46618a}
  .copy.ok{background:var(--accent);color:#06121a}
  .note{color:var(--muted);font-size:13px;padding:4px 0}
  .modal .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
</style>
</head>
<body>

  <!-- ================================================================= -->
  <!--  URL de tu Apps Script (la que termina en /exec) — YA PEGADA       -->
  <!-- ================================================================= -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyKLVJVc4mT39F_xOuCSrjFfnIICHVYNQHpMTMlk9HxT8yg6KwwB6WLInSqY_QMsZg/exec";
  </script>

  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
    <div>
      <div class="logo">
        <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
          <circle cx="24" cy="24" r="6" fill="var(--accent)"/>
          <circle cx="10" cy="13" r="4.5" fill="none" stroke="var(--accent)" stroke-width="2.2"/>
          <circle cx="38" cy="13" r="4.5" fill="none" stroke="var(--accent)" stroke-width="2.2"/>
          <circle cx="10" cy="35" r="4.5" fill="none" stroke="var(--accent)" stroke-width="2.2"/>
          <circle cx="38" cy="35" r="4.5" fill="none" stroke="var(--accent)" stroke-width="2.2"/>
          <line x1="24" y1="24" x2="10" y2="13" stroke="var(--accent)" stroke-width="2.2"/>
          <line x1="24" y1="24" x2="38" y2="13" stroke="var(--accent)" stroke-width="2.2"/>
          <line x1="24" y1="24" x2="10" y2="35" stroke="var(--accent)" stroke-width="2.2"/>
          <line x1="24" y1="24" x2="38" y2="35" stroke="var(--accent)" stroke-width="2.2"/>
        </svg>
        <span class="logo-text">NEXOS</span>
      </div>
      <div class="sub" id="sub">Cargando datos en vivo…</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-lang" id="btnLang" onclick="alternarIdioma()">EN</button>
      <button class="head-donar" id="btnDonarTop" onclick="abrirDonar()">💚 Donar</button>
    </div>
  </div>

  <!-- 1) Resumen / impacto -->
  <div class="resumen">
    <div id="cardDonaciones" class="card resumen-card"></div>
    <div id="totalUsd" class="card resumen-card acc"></div>
    <div id="totalEgresos" class="card resumen-card egr"></div>
    <div id="cardSaldo" class="card resumen-card sal"></div>
  </div>
  <div class="nota-tasas" id="notaTasas"></div>

  <!-- 2) CTA principal + cómo donar -->
  <button class="btn-donar-grande" id="btnDonarBig" onclick="abrirDonar()">💚 Donar ahora</button>
  <div class="ayuda-cta" id="ctaHelp"></div>

  <!-- 3) Detalle por moneda -->
  <h2 class="sec-tit" id="titMoneda">Detalle por moneda</h2>
  <div class="cards" id="cards"></div>

  <!-- 4) Buscar tu donación -->
  <h2 class="sec-tit" id="titBuscar">¿Ya donaste? Busca tu nombre</h2>
  <div class="toolbar">
    <input id="q" placeholder="🔎 Escribe tu nombre…" oninput="render()">
    <select id="fMet" onchange="render()"><option value="">Todos los métodos</option></select>
    <select id="fMon" onchange="render()"><option value="">Todas las monedas</option></select>
  </div>

  <div id="tablaWrap"><div class="loading">Cargando…</div></div>
  <div class="foot" id="foot"></div>

  <!-- 5) Transparencia: egresos -->
  <div id="egresosList" class="egresos-sec"></div>

  <footer class="site-foot">
    <span id="createdBy">Sistema creado por</span>
    <a href="https://www.instagram.com/isiselinor/" target="_blank" rel="noopener">Isis Elinor</a>
  </footer>

  <div class="overlay" id="overlay" onclick="if(event.target===this)cerrarDonar()">
    <div class="modal">
      <div class="top">
        <div>
          <h2 id="modalTitle">Quiero donar 💚</h2>
          <div class="sub2" id="modalSub">Elige un método y copia los datos. ¡Gracias!</div>
        </div>
        <button class="x" onclick="cerrarDonar()">&times;</button>
      </div>

      <div class="aviso" id="aviso">
        ⚠️ En el asunto de la transferencia <b>no menciones Venezuela</b> ni la causa.
      </div>

      <div id="metodosWrap"></div>
    </div>
  </div>

<script>
  var DATA = null;
  var sortCol = 'donante', sortDir = 1;

  // ---------- Idiomas (solo interfaz) ----------
  var I18N = {
    es: {
      tituloPagina:'NEXOS · Reporte de donaciones',
      donar:'💚 Donar', donarAhora:'💚 Donar ahora',
      cta:'Toca <b>Donar ahora</b>, elige el método que prefieras, copia los datos con el botón <b>Copiar</b> y realiza tu aporte. ¡Gracias! 💚',
      tituloMoneda:'Detalle por moneda', tituloBuscar:'¿Ya donaste? Busca tu nombre',
      buscarPh:'🔎 Escribe tu nombre…', todosMetodos:'Todos los métodos', todasMonedas:'Todas las monedas',
      actualizado:'Actualizado', cargandoLive:'Cargando datos en vivo…', cargando:'Cargando…',
      donacionesRecibidas:'Donaciones recibidas', totalRecaudado:'Total recaudado',
      totalEgresos:'Total egresos', saldoDisponible:'Saldo disponible',
      donaciones:'donaciones', convEst:'Conversión estimada', usdUsdt:'USD y USDT 1:1',
      egresosCat:'Egresos por categoría', colDonante:'Donante', colMetodo:'Método', colMonto:'Monto',
      resultados:function(n){return n+' resultado(s) mostrados';},
      vacioBuscar:'🔎 Escribe un nombre en la barra de búsqueda para ver las donaciones de esa persona.',
      sinResultados:'No encontramos donaciones con ese nombre. Revisa cómo está escrito.',
      modalTitulo:'Quiero donar 💚', modalSub:'Elige un método y copia los datos. ¡Gracias!',
      aviso:'⚠️ En el asunto de la transferencia <b>no menciones Venezuela</b> ni la causa.',
      copiar:'Copiar', copiado:'✓ Copiado',
      sinMetodos:'No hay métodos de pago configurados en la hoja "Metodos".',
      creadoPor:'Sistema creado por', errorConexion:'Error de conexión',
      errorDatos:'No se pudieron cargar los datos. Verifica que API_URL esté bien pegada y que la app esté publicada para "Cualquier persona".'
    },
    en: {
      tituloPagina:'NEXOS · Donations report',
      donar:'💚 Donate', donarAhora:'💚 Donate now',
      cta:'Tap <b>Donate now</b>, choose your preferred method, copy the details with the <b>Copy</b> button and make your contribution. Thank you! 💚',
      tituloMoneda:'By currency', tituloBuscar:'Already donated? Search your name',
      buscarPh:'🔎 Type your name…', todosMetodos:'All methods', todasMonedas:'All currencies',
      actualizado:'Updated', cargandoLive:'Loading live data…', cargando:'Loading…',
      donacionesRecibidas:'Donations received', totalRecaudado:'Total raised',
      totalEgresos:'Total expenses', saldoDisponible:'Available balance',
      donaciones:'donations', convEst:'Estimated conversion', usdUsdt:'USD & USDT 1:1',
      egresosCat:'Expenses by category', colDonante:'Donor', colMetodo:'Method', colMonto:'Amount',
      resultados:function(n){return n+' result(s) shown';},
      vacioBuscar:'🔎 Type a name in the search bar to see that person’s donations.',
      sinResultados:'No donations found with that name. Check the spelling.',
      modalTitulo:'I want to donate 💚', modalSub:'Choose a method and copy the details. Thank you!',
      aviso:'⚠️ In the transfer note <b>do not mention Venezuela</b> or the cause.',
      copiar:'Copy', copiado:'✓ Copied',
      sinMetodos:'No payment methods configured in the "Metodos" sheet.',
      creadoPor:'System created by', errorConexion:'Connection error',
      errorDatos:'Could not load the data. Check that API_URL is pasted correctly and the app is published for "Anyone".'
    }
  };
  var LANG = 'es';
  try { var g = localStorage.getItem('lang'); if (g) LANG = g; else if ((navigator.language||'').toLowerCase().indexOf('en')===0) LANG='en'; } catch(e){}
  function T(k){ return I18N[LANG][k]; }

  // Formato de números según idioma (es: 1.234,56 · en: 1,234.56)
  function loc(){ return LANG==='en' ? 'en-US' : 'es-AR'; }
  function fmt(n){
    return new Intl.NumberFormat(loc(),{minimumFractionDigits:2, maximumFractionDigits:2}).format(n);
  }
  function fmt0(n){
    return new Intl.NumberFormat(loc(),{maximumFractionDigits:0}).format(n);
  }

  // Mini-diccionario para términos que vienen del Sheet (solo se traducen en inglés).
  var DIC_EN = {
    // campos de métodos de pago
    'cédula':'ID','cedula':'ID','correo':'Email','alias':'Alias','teléfono':'Phone','telefono':'Phone',
    'titular':'Account holder','banco':'Bank','iban':'IBAN','enlace':'Link','pagar':'Pay','nombre':'Name',
    // categorías de egresos comunes
    'insumos médicos':'Medical supplies','insumos medicos':'Medical supplies','medicinas':'Medicines',
    'medicinas / antibióticos':'Medicines / antibiotics','mercado':'Groceries','comida':'Food',
    'comida y agua':'Food and water','herramientas':'Tools','artículos de higiene':'Hygiene items',
    'articulos de higiene':'Hygiene items','ferretería':'Hardware','ferreteria':'Hardware','farmacia':'Pharmacy',
    'transporte':'Transport','pasajes':'Fares','otros':'Other',
    'sin categoría':'Uncategorized','sin categoria':'Uncategorized','sin especificar':'Unspecified',
    'pago móvil':'Mobile payment','pago movil':'Mobile payment','transferencia':'Transfer'
  };
  function tDato(s){
    if (LANG!=='en' || s==null) return s;
    var hit = DIC_EN[String(s).trim().toLowerCase()];
    return hit || s; // si no está en el diccionario, deja el original
  }

  // Aplica los textos fijos de la interfaz según el idioma.
  function aplicarEstaticos(){
    document.documentElement.lang = LANG;
    document.title = T('tituloPagina');
    document.getElementById('btnLang').textContent = (LANG==='es') ? 'EN' : 'ES';
    document.getElementById('btnDonarTop').textContent = T('donar');
    document.getElementById('btnDonarBig').textContent = T('donarAhora');
    document.getElementById('ctaHelp').innerHTML = T('cta');
    document.getElementById('titMoneda').textContent = T('tituloMoneda');
    document.getElementById('titBuscar').textContent = T('tituloBuscar');
    document.getElementById('q').placeholder = T('buscarPh');
    document.querySelector('#fMet option[value=""]').textContent = T('todosMetodos');
    document.querySelector('#fMon option[value=""]').textContent = T('todasMonedas');
    document.getElementById('modalTitle').textContent = T('modalTitulo');
    document.getElementById('modalSub').textContent = T('modalSub');
    document.getElementById('aviso').innerHTML = T('aviso');
    document.getElementById('createdBy').textContent = T('creadoPor');
    if (!DATA) document.getElementById('sub').textContent = T('cargandoLive');
  }

  function alternarIdioma(){
    LANG = (LANG==='es') ? 'en' : 'es';
    try { localStorage.setItem('lang', LANG); } catch(e){}
    aplicarEstaticos();
    if (DATA) pintar(DATA);
    render();
  }

  function init(d){ DATA = d; aplicarEstaticos(); pintar(d); render(); }

  // Pinta el contenido dinámico (tarjetas, modal, filtros) con el idioma actual.
  function pintar(d){
    document.getElementById('sub').textContent = T('actualizado') + ' ' + d.actualizado;

    document.getElementById('cardDonaciones').innerHTML =
      '<div class="rc-label">'+T('donacionesRecibidas')+'</div>'+
      '<div class="rc-monto">'+fmt0(d.totalDonaciones)+'</div>';

    document.getElementById('cards').innerHTML = d.porMoneda.map(function(m){
      var equiv = (m.usd != null) ? '<div class="det">≈ US$ '+fmt(m.usd)+'</div>' : '';
      return '<div class="card"><div class="moneda">'+m.simbolo+' · '+m.moneda+'</div>'+
             '<div class="monto">'+fmt(m.total)+'</div>'+
             '<div class="det">'+m.count+' '+T('donaciones')+'</div>'+equiv+'</div>';
    }).join('');

    if (d.totalUSD != null) {
      document.getElementById('totalUsd').innerHTML =
        '<div class="rc-label">'+T('totalRecaudado')+'</div>'+
        '<div class="rc-monto">≈ US$ '+fmt(d.totalUSD)+'</div>';
      document.getElementById('notaTasas').textContent =
        T('convEst')+' · ARS '+fmt(d.tasas.arsPorUsd)+'/USD · Bs '+fmt(d.tasas.bsPorUsd)+
        '/USD · EUR×'+d.tasas.usdPorEur+' · '+T('usdUsdt');
    }

    if (d.saldo != null) {
      document.getElementById('cardSaldo').innerHTML =
        '<div class="rc-label">'+T('saldoDisponible')+'</div>'+
        '<div class="rc-monto">≈ US$ '+fmt(d.saldo)+'</div>';
    }

    if (d.totalEgresos != null && d.totalEgresos > 0) {
      document.getElementById('totalEgresos').innerHTML =
        '<div class="rc-label">'+T('totalEgresos')+'</div>'+
        '<div class="rc-monto">≈ US$ '+fmt(d.totalEgresos)+'</div>';
      var cats = d.egresosPorCategoria || [];
      if (cats.length) {
        var bloques = cats.map(function(c){
          var items = c.items.map(function(it){
            return '<tr><td>'+escapeHtml(it.concepto)+'</td><td class="monto">US$ '+fmt(it.monto)+'</td></tr>';
          }).join('');
          return '<details class="cat"><summary><span class="cat-nom">'+escapeHtml(tDato(c.categoria))+'</span>'+
            '<span class="cat-tot">US$ '+fmt(c.total)+'</span></summary>'+
            '<table><tbody>'+items+'</tbody></table></details>';
        }).join('');
        document.getElementById('egresosList').innerHTML =
          '<h2 class="sec-tit">'+T('egresosCat')+'</h2>'+ bloques;
      }
    }

    // Modal de donación (desde la hoja Metodos)
    var mw = document.getElementById('metodosWrap');
    if (d.metodosDonacion && d.metodosDonacion.length) {
      mw.innerHTML = d.metodosDonacion.map(function(m){
        var campos = (m.campos||[]).map(function(c){
          var val = c.enlace
            ? '<a class="v lnk" href="'+escapeHtml(c.copiar)+'" target="_blank" rel="noopener">'+escapeHtml(c.valor)+'</a>'
            : '<span class="v">'+escapeHtml(c.valor)+'</span>';
          var k = c.campo ? '<span class="k">'+escapeHtml(tDato(c.campo))+'</span>' : '';
          return '<div class="field">'+k+val+
                 '<button class="copy" data-c="'+escapeHtml(c.copiar)+'" onclick="copiar(this, this.dataset.c)">'+T('copiar')+'</button></div>';
        }).join('');
        return '<div class="pay"><div class="nombre">'+escapeHtml(m.metodo)+'</div>'+campos+'</div>';
      }).join('');
    } else {
      mw.innerHTML = '<div class="note">'+T('sinMetodos')+'</div>';
    }

    // Filtros (rellenar opciones una sola vez)
    var fMon = document.getElementById('fMon');
    if (fMon.options.length <= 1) {
      d.porMoneda.forEach(function(m){
        var o=document.createElement('option'); o.value=m.moneda; o.textContent=m.simbolo+' ('+m.moneda+')'; fMon.appendChild(o);
      });
    }
    var fMet = document.getElementById('fMet');
    if (fMet.options.length <= 1) {
      (d.metodosPago||[]).forEach(function(met){
        var o=document.createElement('option'); o.value=met; o.textContent=met; fMet.appendChild(o);
      });
    }
  }

  function render(){
    if(!DATA) return;
    var q = document.getElementById('q').value.trim().toLowerCase();
    var fmon = document.getElementById('fMon').value;
    var fmet = document.getElementById('fMet').value;

    if(q === ''){
      document.getElementById('tablaWrap').innerHTML = '<div class="empty">'+T('vacioBuscar')+'</div>';
      document.getElementById('foot').textContent = '';
      return;
    }

    var rows = DATA.movimientos.filter(function(m){
      if(q && m.donante.toLowerCase().indexOf(q)===-1) return false;
      if(fmon && m.moneda!==fmon) return false;
      if(fmet && m.metodo!==fmet) return false;
      return true;
    });

    if(rows.length === 0){
      document.getElementById('tablaWrap').innerHTML = '<div class="empty">'+T('sinResultados')+'</div>';
      document.getElementById('foot').textContent = '';
      return;
    }

    rows.sort(function(a,b){
      var x=a[sortCol], y=b[sortCol];
      if(sortCol==='monto'){ return (x-y)*sortDir; }
      x=String(x).toLowerCase(); y=String(y).toLowerCase();
      return (x<y?-1:x>y?1:0)*sortDir;
    });

    var html = '<table><thead><tr>'+
      '<th onclick="sortBy(\'donante\')">'+T('colDonante')+'</th>'+
      '<th onclick="sortBy(\'metodo\')">'+T('colMetodo')+'</th>'+
      '<th onclick="sortBy(\'monto\')" style="text-align:right">'+T('colMonto')+'</th>'+
      '</tr></thead><tbody>';
    rows.forEach(function(m){
      html += '<tr><td>'+escapeHtml(m.donante)+'</td>'+
              '<td><span class="tag">'+escapeHtml(tDato(m.metodo))+'</span></td>'+
              '<td class="monto">'+m.simbolo+' '+fmt(m.monto,m.moneda)+'</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tablaWrap').innerHTML = html;
    document.getElementById('foot').textContent = T('resultados')(rows.length);
  }

  function sortBy(col){
    if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
    render();
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function fallar(e){
    document.getElementById('tablaWrap').innerHTML = '<div class="empty">'+T('errorDatos')+'</div>';
    document.getElementById('sub').textContent = T('errorConexion');
  }

  // ---- Modal donar ----
  function abrirDonar(){ document.getElementById('overlay').classList.add('open'); }
  function cerrarDonar(){ document.getElementById('overlay').classList.remove('open'); }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') cerrarDonar(); });

  function copiar(btn, texto){
    var done = function(){
      var t = btn.textContent; btn.textContent=T('copiado'); btn.classList.add('ok');
      setTimeout(function(){ btn.textContent=t; btn.classList.remove('ok'); }, 1400);
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(texto).then(done, function(){ fallback(texto); done(); });
    } else { fallback(texto); done(); }
  }
  function fallback(texto){
    var ta=document.createElement('textarea'); ta.value=texto;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta);
  }

  // Idioma inicial en la interfaz fija (antes de que lleguen los datos)
  aplicarEstaticos();

  // ---- Cargar datos desde el Apps Script vía JSONP (evita el bloqueo CORS) ----
  var _cargado = false;
  window.__recibeDonaciones = function(d){ _cargado = true; init(d); };

  function cargarDatos(){
    var sep = API_URL.indexOf('?') === -1 ? '?' : '&';
    var s = document.createElement('script');
    s.src = API_URL + sep + 'callback=__recibeDonaciones';
    s.onerror = function(){ fallar(); };
    document.body.appendChild(s);
    setTimeout(function(){ if(!_cargado) fallar(); }, 12000);
  }
  cargarDatos();
</script>
</body>
</html>
